server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/wedding_invitations}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-ihzu1eqm6kr7z6rb.us.auth0.com/
          audience: https://allsetoAuth.com

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

app:
  localization:
    supported-languages:
      - en
      - hy
      - ru
  pricing:
    base-price: 20000.0
  promo-codes:
    codes:
      - code: WELCOME10
        discount-type: PERCENTAGE
        discount-value: 10
        active: true

idram:
  rec-account: ${IDRAM_REC_ACCOUNT:}
  secret-key: ${IDRAM_SECRET_KEY:}
  success-url: ${IDRAM_SUCCESS_URL:https://allset.am/payment/success}
  fail-url: ${IDRAM_FAIL_URL:https://allset.am/payment/fail}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:allset-images}
    region: ${AWS_REGION:eu-west-3}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
