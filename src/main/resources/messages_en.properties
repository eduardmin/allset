# FAQ
faq.1.question=How do I create a digital invitation on Allset.am?
faq.1.answer=Creating a digital invitation on Allset.am takes just a few minutes. Simply sign up, choose a design, fill in details \u2014 names, photos, schedule, and more, pay online, and start inviting guests immediately after payment.
faq.2.question=Can I also print the invitation?
faq.2.answer=We offer digital invitations only. If you need a print-ready file, please contact us.
faq.3.question=What features do allset.am invitations offer?
faq.3.answer=Our digital invitations are not only beautiful but also functional: you can track guest responses, manage your guest list through a convenient interface, and share event photos directly in the invitation. Our invitations are innovative and designed to simplify event planning.
faq.4.question=Can I change the invitation design colors and texts?
faq.4.answer=Of course \u2014 and it's very easy. Each invitation includes pre-designed color options created by our experienced designers. Invitation texts are available in three languages, without requiring extra time for translations. With our easy-to-use editor, you can change colors and texts in just a few clicks and preview your invitation before payment. You can make these changes multiple times, even after the invitation is activated.
faq.5.question=Can I make changes after activating the invitation?
faq.5.answer=Yes. Even after activation, you can edit photos, texts, schedule, and location. The only thing that cannot be changed after activation is the event date.

