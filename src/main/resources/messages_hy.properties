faq.1.answer=Allset.am-\u0578\u0582\u0574 \u0569\u057E\u0561\u0575\u056B\u0576 \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D \u057D\u057F\u0565\u0572\u056E\u0565\u056C\u0568 \u057F\u0587\u0578\u0582\u0574 \u0567 \u0568\u0576\u0564\u0561\u0574\u0565\u0576\u0568 \u0574\u056B \u0584\u0561\u0576\u056B \u0580\u0578\u057A\u0565. \u054A\u0561\u0580\u0566\u0561\u057A\u0565\u057D \u0563\u0580\u0561\u0576\u0581\u057E\u056B\u0580, \u0568\u0576\u057F\u0580\u056B\u0580 \u0564\u056B\u0566\u0561\u0575\u0576\u0568, \u056C\u0580\u0561\u0581\u0580\u056B\u0580 \u057F\u057E\u0575\u0561\u056C\u0576\u0565\u0580\u0568 \u2014 \u0561\u0576\u0578\u0582\u0576\u0576\u0565\u0580\u0568, \u056C\u0578\u0582\u057D\u0561\u0576\u056F\u0561\u0580\u0576\u0565\u0580\u0568, \u056A\u0561\u0574\u0561\u0576\u0561\u056F\u0561\u0581\u0578\u0582\u0575\u0581\u0568 \u0587 \u0561\u0575\u056C, \u056F\u0561\u057F\u0561\u0580\u056B\u0580 \u057E\u0573\u0561\u0580\u0578\u0582\u0574\u0568 \u0585\u0576\u056C\u0561\u0575\u0576 \u0587 \u057D\u056F\u057D\u056B\u0580 \u0570\u0580\u0561\u057E\u056B\u0580\u0565\u056C \u0570\u0575\u0578\u0582\u0580\u0565\u0580\u056B\u0576 \u0561\u0576\u0574\u056B\u057B\u0561\u057A\u0565\u057D \u057E\u0573\u0561\u0580\u0578\u0582\u0574\u056B\u0581 \u0570\u0565\u057F\u0578:
faq.2.question=\u053F\u0561\u0580\u0578\u0572 \u0565\u0574 \u0576\u0561\u0587 \u057F\u057A\u0565\u056C \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u0568\u055E
faq.2.answer=\u0544\u0565\u0576\u0584 \u0561\u057C\u0561\u057B\u0561\u0580\u056F\u0578\u0582\u0574 \u0565\u0576\u0584 \u0574\u056B\u0561\u0575\u0576 \u0569\u057E\u0561\u0575\u056B\u0576 \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u0576\u0565\u0580: \u0535\u0569\u0565 \u0571\u0565\u0566 \u0561\u0576\u0570\u0580\u0561\u056A\u0565\u0577\u057F \u0567 \u057F\u057A\u0561\u0563\u0580\u0578\u0582\u0569\u0575\u0561\u0576 \u0570\u0561\u0574\u0561\u0580 \u057A\u0561\u057F\u0580\u0561\u057D\u057F \u0586\u0561\u0575\u056C \u2014 \u056F\u0561\u057A\u057E\u0565\u0584 \u0574\u0565\u0566:
faq.3.question=\u053B\u0576\u0579 \u0570\u0576\u0561\u0580\u0561\u057E\u0578\u0580\u0578\u0582\u0569\u0575\u0578\u0582\u0576\u0576\u0565\u0580 \u0565\u0576 \u0561\u057C\u0561\u057B\u0561\u0580\u056F\u0578\u0582\u0574 allset.am-\u056B \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u0576\u0565\u0580\u0568\u055E
faq.3.answer=\u0544\u0565\u0580 \u0569\u057E\u0561\u0575\u056B\u0576 \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u0576\u0565\u0580\u0568 \u0578\u0579 \u0574\u056B\u0561\u0575\u0576 \u057F\u057A\u0561\u057E\u0578\u0580\u056B\u0579 \u0565\u0576, \u0561\u0575\u056C \u0576\u0561\u0587 \u0586\u0578\u0582\u0576\u056F\u0581\u056B\u0578\u0576\u0561\u056C. \u0564\u0578\u0582\u0584 \u056F\u0561\u0580\u0578\u0572 \u0565\u0584 \u0570\u0565\u057F\u0587\u0565\u056C \u0570\u0575\u0578\u0582\u0580\u0565\u0580\u056B \u057A\u0561\u057F\u0561\u057D\u056D\u0561\u0576\u0576\u0565\u0580\u0568, \u056F\u0561\u057C\u0561\u057E\u0561\u0580\u0565\u056C \u0570\u0575\u0578\u0582\u0580\u0565\u0580\u056B \u0581\u0578\u0582\u0581\u0561\u056F\u0568 \u0570\u0561\u0580\u0574\u0561\u0580 \u056B\u0576\u057F\u0565\u0580\u0586\u0565\u0575\u057D\u056B \u0574\u056B\u057B\u0578\u0581\u0578\u057E \u0587 \u056F\u056B\u057D\u0565\u056C \u0574\u056B\u057B\u0578\u0581\u0561\u057C\u0574\u0561\u0576 \u056C\u0578\u0582\u057D\u0561\u0576\u056F\u0561\u0580\u0576\u0565\u0580\u0568 \u0561\u0576\u0574\u056B\u057B\u0561\u057A\u0565\u057D \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u0578\u0582\u0574: \u0544\u0565\u0580 \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u0576\u0565\u0580\u0568 \u0576\u0578\u0580\u0561\u0580\u0561\u0580\u0561\u056F\u0561\u0576 \u0565\u0576 \u0587 \u057D\u057F\u0565\u0572\u056E\u057E\u0561\u056E \u0565\u0576 \u0574\u056B\u057B\u0578\u0581\u0561\u057C\u0574\u0561\u0576 \u056F\u0561\u0566\u0574\u0561\u056F\u0565\u0580\u057A\u0578\u0582\u0574\u0568 \u057A\u0561\u0580\u0566\u0565\u0581\u0576\u0565\u056C\u0578\u0582 \u0570\u0561\u0574\u0561\u0580:
faq.4.question=\u053F\u0561\u0580\u0578\u0572 \u0565\u0574 \u0583\u0578\u056D\u0565\u056C \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u056B \u0564\u056B\u0566\u0561\u0575\u0576\u056B \u0563\u0578\u0582\u0575\u0576\u0565\u0580\u0568 \u0587 \u057F\u0565\u0584\u057D\u057F\u0565\u0580\u0568\u055E
faq.4.answer=\u053B\u0570\u0561\u0580\u056F\u0565, \u0587 \u0564\u0561 \u0577\u0561\u057F \u0570\u0565\u0577\u057F \u0567: \u0545\u0578\u0582\u0580\u0561\u0584\u0561\u0576\u0579\u0575\u0578\u0582\u0580 \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D \u0578\u0582\u0576\u056B \u0576\u0561\u056D\u0561\u057A\u0565\u057D \u0574\u0577\u0561\u056F\u057E\u0561\u056E \u0563\u0578\u0582\u0576\u0561\u0575\u056B\u0576 \u057F\u0561\u0580\u0562\u0565\u0580\u0561\u056F\u0576\u0565\u0580 \u0574\u0565\u0580 \u0583\u0578\u0580\u0571\u0561\u057C\u0578\u0582 \u0564\u056B\u0566\u0561\u0575\u0576\u0565\u0580\u0576\u0565\u0580\u056B \u056F\u0578\u0572\u0574\u056B\u0581: \u0540\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u056B \u057F\u0565\u0584\u057D\u057F\u0565\u0580\u0568 \u0570\u0561\u057D\u0561\u0576\u0565\u056C\u056B \u0565\u0576 \u0565\u0580\u0565\u0584 \u056C\u0565\u0566\u057E\u0578\u057E \u2014 \u0561\u057C\u0561\u0576\u0581 \u0569\u0561\u0580\u0563\u0574\u0561\u0576\u0578\u0582\u0569\u0575\u0578\u0582\u0576\u0576\u0565\u0580\u056B \u0570\u0561\u0574\u0561\u0580 \u056C\u0580\u0561\u0581\u0578\u0582\u0581\u056B\u0579 \u056A\u0561\u0574\u0561\u0576\u0561\u056F \u056E\u0561\u056D\u057D\u0565\u056C\u0578\u0582: \u0544\u0565\u0580 \u0570\u0561\u0580\u0574\u0561\u0580 \u056D\u0574\u0562\u0561\u0563\u0580\u056B\u0579\u0578\u057E \u0564\u0578\u0582\u0584 \u056F\u0561\u0580\u0578\u0572 \u0565\u0584 \u0574\u056B \u0584\u0561\u0576\u056B \u0570\u057A\u0578\u0582\u0574\u0578\u057E \u0583\u0578\u056D\u0565\u056C \u0563\u0578\u0582\u0575\u0576\u0565\u0580\u0568, \u057F\u0565\u0584\u057D\u057F\u0565\u0580\u0568 \u0587 \u057F\u0565\u057D\u0576\u0565\u056C \u0571\u0565\u0580 \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u056B \u057F\u0561\u0580\u0562\u0565\u0580\u0561\u056F\u0568 \u0574\u056B\u0576\u0579\u0587 \u057E\u0573\u0561\u0580\u0578\u0582\u0574\u0568: \u0531\u0575\u057D \u0583\u0578\u0583\u0578\u056D\u0578\u0582\u0569\u0575\u0578\u0582\u0576\u0576\u0565\u0580\u0568 \u056F\u0561\u0580\u0578\u0572 \u0565\u0584 \u056F\u0561\u057F\u0561\u0580\u0565\u056C \u0561\u0576\u057D\u0561\u0570\u0574\u0561\u0576\u0561\u0583\u0561\u056F \u0569\u057E\u0578\u057E \u2014 \u0576\u0578\u0582\u0575\u0576\u056B\u057D\u056F \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u056B \u0561\u056F\u057F\u056B\u057E\u0561\u0581\u0578\u0582\u0574\u056B\u0581 \u0570\u0565\u057F\u0578:
faq.5.question=\u053F\u0561\u0580\u0578\u0572 \u0565\u0574 \u0583\u0578\u0583\u0578\u056D\u0578\u0582\u0569\u0575\u0578\u0582\u0576\u0576\u0565\u0580 \u056F\u0561\u057F\u0561\u0580\u0565\u056C \u0570\u0580\u0561\u057E\u056B\u0580\u0561\u057F\u0578\u0574\u057D\u056B \u0561\u056F\u057F\u056B\u057E\u0561\u0581\u0578\u0582\u0574\u056B\u0581 \u0570\u0565\u057F\u0578\u055E
faq.5.answer=\u0531\u0575\u0578: \u0546\u0578\u0582\u0575\u0576\u056B\u057D\u056F \u0561\u056F\u057F\u056B\u057E\u0561\u0581\u0578\u0582\u0574\u056B\u0581 \u0570\u0565\u057F\u0578 \u0564\u0578\u0582\u0584 \u056F\u0561\u0580\u0578\u0572 \u0565\u0584 \u0583\u0578\u056D\u0565\u056C \u056C\u0578\u0582\u057D\u0561\u0576\u056F\u0561\u0580\u0576\u0565\u0580\u0568, \u057F\u0565\u0584\u057D\u057F\u0565\u0580\u0568, \u056A\u0561\u0574\u0561\u0576\u0561\u056F\u0561\u0581\u0578\u0582\u0575\u0581\u0568 \u0587 \u057E\u0561\u0575\u0580\u0568: \u0544\u056B\u0561\u056F \u0562\u0561\u0576\u0568, \u0578\u0580\u0568 \u0570\u0576\u0561\u0580\u0561\u057E\u0578\u0580 \u0579\u0567 \u0583\u0578\u056D\u0565\u056C \u0561\u056F\u057F\u056B\u057E\u0561\u0581\u0578\u0582\u0574\u056B\u0581 \u0570\u0565\u057F\u0578 \u2014 \u0574\u056B\u057B\u0578\u0581\u0561\u057C\u0574\u0561\u0576 \u0561\u0574\u057D\u0561\u0569\u056B\u057E\u0576 \u0567:

